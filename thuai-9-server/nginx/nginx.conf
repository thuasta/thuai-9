worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    sendfile      on;

    client_max_body_size 11m;

    # Use Docker's embedded DNS so upstream names are resolved at request time,
    # not at startup — prevents crash-loop when a backend isn't ready yet.
    resolver 127.0.0.11 valid=5s;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;

    server {
        listen 80;
        server_name _;

        # Static Docusaurus site
        root /usr/share/nginx/html;
        index index.html;

        location / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri $uri/ /index.html;
        }

        # Submission API — general
        # Variable-based proxy_pass defers DNS lookup to request time
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $upstream_api http://submission-api:8000;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass         $upstream_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Tighter rate limit on file upload
        location /api/submissions/upload {
            limit_req zone=upload burst=30 nodelay;
            client_max_body_size 11m;
            set $upstream_api http://submission-api:8000;
            rewrite ^/api/submissions/upload$ /submissions/upload break;
            proxy_pass         $upstream_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Tighter rate limit on registration
        location /api/register {
            limit_req zone=auth burst=3 nodelay;
            set $upstream_api http://submission-api:8000;
            rewrite ^/api/register$ /register break;
            proxy_pass         $upstream_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Spectator UI
        location = /spectator {
            return 301 $scheme://$http_host/spectator/;
        }

        location /spectator/ {
            set $upstream_spectator http://web-spectator:5173;
            rewrite ^/spectator/(.*)$ /$1 break;
            proxy_pass       $upstream_spectator;
            proxy_set_header Host $host;
        }

        # Game server WebSocket — used by the spectator UI
        location /ws/game {
            set $upstream_game http://thuai9-live-server:14514;
            proxy_pass             $upstream_game;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }
    }
}
