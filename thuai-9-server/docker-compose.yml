services:
  postgres:
    image: postgres:16-alpine
    container_name: thuai9-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: thuai9
      POSTGRES_USER: thuai9
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thuai9"]
      interval: 5s
      timeout: 5s
      retries: 5

  submission-api:
    build: ./submission-api
    container_name: thuai9-submission-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://thuai9:${POSTGRES_PASSWORD}@postgres/thuai9
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_DIR: /workspace/submission-data/uploads
      ARTIFACT_DIR: /workspace/submission-data/artifacts
    volumes:
      - ./submission-data:/workspace/submission-data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  evaluator:
    build: ./evaluator
    container_name: thuai9-evaluator
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://thuai9:${POSTGRES_PASSWORD}@postgres/thuai9
      ARTIFACT_DIR: /workspace/submission-data/artifacts
      UPLOAD_DIR: /workspace/submission-data/uploads
      MATCH_DATA_DIR: /workspace/matches
      GAME_CONFIG_DIR: /workspace/config
      EVALUATOR_CONTAINER_NAME: thuai9-evaluator
      LIVE_SERVER_CONFIG_DIR: /workspace/data
      LIVE_SERVER_IMAGE: ghcr.io/thuasta/thuai-9-server:latest
      LIVE_SERVER_CONTAINER: thuai9-live-server
      LIVE_SERVER_URL: ws://thuai9-live-server:14514
      LIVE_SERVER_NETWORK: thuai-9-server_internal
      LIVE_SERVER_DATA_DIR: /workspace/data
      RESTART_LIVE_SERVER: "true"
    volumes:
      - ./submission-data:/workspace/submission-data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./matches:/workspace/matches
      - ./config:/workspace/config:ro
      - ./data:/workspace/data
    depends_on:
      postgres:
        condition: service_healthy
      # submission-api owns the authoritative schema (it models every table incl.
      # teams + foreign keys); start it first so its create_all wins the bootstrap
      # and the evaluator's fallback create_all is a no-op on existing tables.
      submission-api:
        condition: service_started
    networks:
      - internal

  web-spectator:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: thuai9-web-spectator
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: thuai9-nginx
    restart: unless-stopped
    depends_on:
      submission-api:
        condition: service_started
      web-spectator:
        condition: service_started
    ports:
      - "14514:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./portal:/usr/share/nginx/html:ro
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
